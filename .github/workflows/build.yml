name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    # macOS 15 runner: matches LSMinimumSystemVersion 15.0 and ships the SDK the
    # app targets. The Xcode toolchain here is a superset of Command Line Tools,
    # so the CLT-pinned deps (swift-testing 0.12, KeyboardShortcuts 1.10) resolve
    # and build fine via Package.resolved.
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so build-app.sh's `git rev-list --count HEAD` yields the
          # real, monotonic build number (a shallow clone would report 1).
          fetch-depth: 0

      # Import the free self-signed cert (set by scripts/setup-signing-cert.sh)
      # into a throwaway keychain so build-app.sh signs with the stable
      # "Capture Studio Dev" identity instead of falling back to ad-hoc.
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "::warning::APPLE_CERTIFICATE secret not set — build-app.sh will ad-hoc sign (TCC will re-prompt)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KP="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build app
        run: scripts/build-app.sh release

      - name: Build DMG
        run: |
          brew install create-dmg
          scripts/make-dmg.sh

      # Tag push: create/attach a draft GitHub Release with the .dmg.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
          name: Capture Studio ${{ github.ref_name }}
          body: |
            Self-signed build — not yet Apple-notarized. On a direct download macOS
            shows an "unverified developer" prompt: right-click the app → Open, or
            install via Homebrew (`brew install --cask wadjakorn/capture-studio/capture-studio`),
            which strips the quarantine flag.

      # Dispatch (no tag): keep the .dmg as a downloadable run artifact for smoke-testing.
      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CaptureStudio-dmg
          path: dist/*.dmg
          if-no-files-found: error
